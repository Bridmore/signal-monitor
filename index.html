<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Monitor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg: #0d0d14;
    --bg2: #13131e;
    --bg3: #1a1a28;
    --border: #2a2a3d;
    --text: #ffffff;
    --text2: #d4d4f0;
    --text3: #9898c0;
    --accent: #7c6af7;
    --accent2: #5b4fd4;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; }
  .app-title { font-weight: 700; font-size: 15px; color: var(--text); }
  .app-date { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .header-actions { display: flex; gap: 8px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 13px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); color: var(--text); }
  .btn-ghost { background: transparent; color: var(--text3); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg3); color: var(--text2); }
  .btn-green { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
  .btn-green:hover { background: rgba(34,197,94,.25); }
  .btn-danger { background: rgba(239,68,68,.1); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
  .btn-danger:hover { background: rgba(239,68,68,.2); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* Stats */
  .stats-bar { display: flex; gap: 1px; padding: 0 20px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat-item { flex: 1; background: var(--bg2); padding: 12px 16px; text-align: center; }
  .stat-n { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-l { font-size: 11px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: .04em; }

  /* Main layout */
  .main { padding: 20px; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

  /* Section */
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }

  /* Manual checks */
  .checks-grid { display: flex; flex-direction: column; gap: 6px; }
  .check-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); }
  .check-type { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: .04em; }
  .check-type.paywall { background: rgba(245,158,11,.12); color: var(--amber); }
  .check-type.report { background: rgba(59,130,246,.12); color: var(--blue); }
  .check-name { flex: 1; font-size: 13px; color: var(--text); }
  .check-due { font-size: 11px; color: var(--red); margin-left: auto; margin-right: 10px; }
  .check-ok { font-size: 11px; color: var(--text3); margin-left: auto; margin-right: 10px; }
  .all-clear { display: flex; align-items: center; gap: 8px; padding: 14px; color: var(--green); font-size: 13px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); }

  /* Signal feed */
  .cluster-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
  .tab { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg2); color: var(--text3); font-size: 12px; cursor: pointer; transition: all .15s; }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab:hover:not(.active) { background: var(--bg3); color: var(--text2); }

  /* Signal card */
  .signal-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .signal-card.urgency-today { border-left: 3px solid var(--red); }
  .signal-card.urgency-this_week { border-left: 3px solid var(--amber); }
  .signal-card.urgency-file { border-left: 3px solid var(--text3); }

  .signal-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .signal-headline { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; flex: 1; }
  .signal-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .score-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 5px; }
  .score-high { background: rgba(34,197,94,.15); color: var(--green); }
  .score-mid { background: rgba(245,158,11,.15); color: var(--amber); }
  .score-low { background: rgba(107,114,128,.15); color: var(--text3); }
  .urgency-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; letter-spacing: .04em; }
  .urg-today { background: rgba(239,68,68,.15); color: var(--red); }
  .urg-this_week { background: rgba(245,158,11,.12); color: var(--amber); }
  .urg-file { background: rgba(107,114,128,.1); color: var(--text3); }
  .velocity-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 5px; }
  .vel-rising { background: rgba(34,197,94,.1); color: var(--green); }
  .vel-stable { background: rgba(107,114,128,.1); color: var(--text2); }
  .vel-fading { background: rgba(239,68,68,.08); color: var(--text3); }

  .signal-why { font-size: 12px; color: var(--text2); }
  .signal-angle-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .signal-angle { font-size: 13px; color: var(--accent); font-style: italic; }
  .signal-draft-wrap { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 12px; }
  .signal-draft { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .signal-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .signal-source { font-size: 11px; color: var(--text3); margin-left: auto; }

  /* Empty / loading */
  .empty-state { padding: 40px 20px; text-align: center; color: var(--text3); }
  .empty-icon { font-size: 32px; margin-bottom: 8px; opacity: .4; }
  .empty-title { font-size: 14px; color: var(--text2); margin-bottom: 4px; }
  .empty-sub { font-size: 12px; }
  .loading-msg { padding: 30px; text-align: center; color: var(--text3); font-size: 13px; }

  /* Toast */
  #toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(8px); transition: all .25s; pointer-events: none; z-index: 9999; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok { background: #16a34a; color: #fff; }
  #toast.err { background: #dc2626; color: #fff; }
  #toast.info { background: var(--accent); color: #fff; }

  @media (max-width: 600px) {
    .header { padding: 12px 14px; }
    .header-actions { gap: 6px; }
    .btn { padding: 6px 10px; font-size: 12px; }
    .main { padding: 14px; gap: 16px; }
    .stats-bar { padding: 0; }
    .stat-n { font-size: 18px; }
    .signal-top { flex-direction: column; gap: 8px; }
    .signal-meta { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo"><i class="ti ti-antenna-bars-5"></i></div>
    <div>
      <div class="app-title">Signal Monitor</div>
      <div class="app-date" id="hdr-date"></div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-secondary" id="btn-ingest" onclick="runIngest()">
      <i class="ti ti-refresh"></i> Ingest
    </button>
    <button class="btn btn-primary" id="btn-process" onclick="runProcess()">
      <i class="ti ti-cpu"></i> Process Queue
    </button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-n" id="stat-sources">—</div><div class="stat-l">Sources</div></div>
  <div class="stat-item"><div class="stat-n" id="stat-checks">—</div><div class="stat-l">Checks Due</div></div>
  <div class="stat-item"><div class="stat-n" id="stat-queue">—</div><div class="stat-l">Unprocessed</div></div>
  <div class="stat-item"><div class="stat-n" id="stat-signals">—</div><div class="stat-l">Signals</div></div>
</div>

<div class="main">

  <!-- Manual checks -->
  <div>
    <div class="section-label">Manual checks due</div>
    <div class="checks-grid" id="checks-list"><div class="loading-msg">Loading...</div></div>
  </div>

  <!-- Signal feed -->
  <div>
    <div class="section-label">Signal feed</div>
    <div class="cluster-tabs" id="cluster-tabs"></div>
    <div id="signal-feed"><div class="loading-msg">Loading signals...</div></div>
  </div>

</div>

<div id="toast"></div>

<script>
const SUPA_URL = 'https://pkfnbxtwgpjqtqwpicax.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrZm5ieHR3Z3BqcXRxd3BpY2F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5ODQxODAsImV4cCI6MjA5MzU2MDE4MH0.0CjR9W2yb84_sRJCj6LVrZO1GYXjVNgmQapZHZ26ius';
const FUNC = 'https://pkfnbxtwgpjqtqwpicax.supabase.co/functions/v1';
const HEADS = { 'Content-Type': 'application/json', 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` };
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

const CLUSTER_LABELS = {
  all: 'All',
  fifa_2034_saudi: 'FIFA 2034',
  gcc_regional: 'GCC Regional',
  programme_delivery: 'Programme Delivery',
  mega_event_governance: 'Mega-event Gov.',
  deal_origination: 'Deal Origination',
  operator_business: 'Operator',
  ai_applied: 'AI Applied'
};

let allSignals = [];
let activeCluster = 'all';

function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  setTimeout(() => { el.className = ''; }, 3000);
}

function scoreClass(n) { return n >= 8 ? 'score-high' : n >= 6 ? 'score-mid' : 'score-low'; }

async function loadStats() {
  const [{ count: sources }, { count: rawCount }, { count: procCount }, { count: checksCount }] = await Promise.all([
    db.from('monitored_sources').select('id', { count: 'exact', head: true }).is('deleted_at', null),
    db.from('raw_signals').select('id', { count: 'exact', head: true }).is('deleted_at', null),
    db.from('processed_signals').select('id', { count: 'exact', head: true }).is('deleted_at', null),
    db.from('monitored_sources').select('id', { count: 'exact', head: true })
      .is('deleted_at', null)
      .in('access_type', ['paywalled', 'report_portal'])
  ]);
  document.getElementById('stat-sources').textContent = sources ?? '—';
  document.getElementById('stat-queue').textContent = (rawCount ?? 0) - (procCount ?? 0);
  document.getElementById('stat-signals').textContent = procCount ?? '—';

  // checks due
  const { data: checksData } = await db
    .from('monitored_sources')
    .select('last_checked, check_frequency_days')
    .is('deleted_at', null)
    .in('access_type', ['paywalled', 'report_portal']);
  const now = Date.now();
  const due = (checksData ?? []).filter(s => {
    if (!s.last_checked) return true;
    const freq = (s.check_frequency_days || 7) * 86400000;
    return now - new Date(s.last_checked).getTime() > freq;
  });
  document.getElementById('stat-checks').textContent = due.length;
}

async function loadManualChecks() {
  const { data, error } = await db
    .from('monitored_sources')
    .select('id, name, url, access_type, last_checked, check_frequency_days')
    .is('deleted_at', null)
    .in('access_type', ['paywalled', 'report_portal'])
    .order('name');

  const el = document.getElementById('checks-list');
  if (error || !data) { el.innerHTML = '<div class="loading-msg">Failed to load checks</div>'; return; }

  const now = Date.now();
  const due = data.filter(s => {
    if (!s.last_checked) return true;
    const freq = (s.check_frequency_days || 7) * 86400000;
    return now - new Date(s.last_checked).getTime() > freq;
  });

  if (due.length === 0) {
    el.innerHTML = `<div class="all-clear"><i class="ti ti-circle-check" style="color:var(--green)"></i> All checks up to date</div>`;
    return;
  }

  el.innerHTML = due.map(s => {
    const isPaywall = s.access_type === 'paywalled';
    const typeLabel = isPaywall ? 'Paywall' : 'Report';
    const typeClass = isPaywall ? 'paywall' : 'report';
    const dueText = !s.last_checked ? 'Never checked' : 'Due now';
    return `<div class="check-item" id="chk-${s.id}">
      <span class="check-type ${typeClass}">${typeLabel}</span>
      <span class="check-name">${s.name}</span>
      <span class="check-due">${dueText}</span>
      ${s.url ? `<a href="${s.url}" target="_blank" class="btn btn-ghost btn-sm"><i class="ti ti-external-link"></i> Open</a>` : ''}
      <button class="btn btn-secondary btn-sm" onclick="markChecked('${s.id}')"><i class="ti ti-check"></i> Done</button>
    </div>`;
  }).join('');
}

async function markChecked(id) {
  await db.from('monitored_sources').update({ last_checked: new Date().toISOString() }).eq('id', id);
  document.getElementById(`chk-${id}`)?.remove();
  const remaining = document.querySelectorAll('[id^="chk-"]').length;
  if (remaining === 0) {
    document.getElementById('checks-list').innerHTML = `<div class="all-clear"><i class="ti ti-circle-check" style="color:var(--green)"></i> All checks up to date</div>`;
  }
  await loadStats();
  toast('Marked checked', 'ok');
}

async function loadSignals() {
  const { data, error } = await db
    .from('processed_signals')
    .select(`id, relevance_score, urgency, trend_velocity, why_relevant, suggested_angle, draft_paragraph, status, created_at, raw_signals!inner(headline, topic_cluster, url)`)
    .is('deleted_at', null)
    .neq('status', 'dismissed')
    .order('relevance_score', { ascending: false })
    .order('created_at', { ascending: false })
    .limit(50);

  if (error) {
    // fallback join via separate queries
    const { data: ps } = await db.from('processed_signals').select('*').is('deleted_at', null).neq('status', 'dismissed').order('relevance_score', { ascending: false }).limit(50);
    if (!ps || ps.length === 0) { renderSignals([]); return; }
    const rsIds = ps.map(p => p.raw_signal_id);
    const { data: rs } = await db.from('raw_signals').select('id, headline, topic_cluster, url').in('id', rsIds);
    const rsMap = Object.fromEntries((rs ?? []).map(r => [r.id, r]));
    allSignals = ps.map(p => ({ ...p, raw_signals: rsMap[p.raw_signal_id] || {} }));
    renderSignals(allSignals);
    buildTabs();
    return;
  }

  allSignals = (data ?? []);
  renderSignals(allSignals);
  buildTabs();
}

function buildTabs() {
  const clusters = ['all', ...new Set(allSignals.map(s => s.raw_signals?.topic_cluster).filter(Boolean))];
  const tabs = document.getElementById('cluster-tabs');
  tabs.innerHTML = clusters.map(c => `<div class="tab ${c === activeCluster ? 'active' : ''}" data-cluster="${c}" onclick="switchCluster('${c}')">${CLUSTER_LABELS[c] || c}</div>`).join('');
}

function switchCluster(c) {
  activeCluster = c;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cluster === c));
  renderSignals(allSignals);
}

function renderSignals(signals) {
  const feed = document.getElementById('signal-feed');
  const filtered = activeCluster === 'all' ? signals : signals.filter(s => s.raw_signals?.topic_cluster === activeCluster);

  if (!filtered || filtered.length === 0) {
    feed.innerHTML = `<div class="empty-state">
      <div class="empty-icon"><i class="ti ti-broadcast-off"></i></div>
      <div class="empty-title">${signals.length === 0 ? 'No signals processed yet' : 'No signals in this cluster'}</div>
      <div class="empty-sub">${signals.length === 0 ? 'Hit Process Queue to analyse the inbox' : 'Try a different cluster tab'}</div>
    </div>`;
    return;
  }

  feed.innerHTML = filtered.map(s => {
    const r = s.raw_signals || {};
    const urgClass = `urgency-${s.urgency}`;
    const urgLabel = s.urgency === 'this_week' ? 'This week' : s.urgency === 'today' ? 'Today' : 'File';
    const velClass = `vel-${s.trend_velocity}`;
    return `<div class="signal-card ${urgClass}" id="sig-${s.id}" style="margin-bottom:10px">
      <div class="signal-top">
        <div class="signal-headline">${r.headline || 'Untitled signal'}</div>
        <div class="signal-meta">
          <span class="score-badge ${scoreClass(s.relevance_score)}">${s.relevance_score}/10</span>
          <span class="urgency-badge urg-${s.urgency}">${urgLabel}</span>
          <span class="velocity-badge ${velClass}">${s.trend_velocity || ''}</span>
        </div>
      </div>
      <div class="signal-why">${s.why_relevant || ''}</div>
      <div>
        <div class="signal-angle-label">Suggested angle</div>
        <div class="signal-angle">${s.suggested_angle || ''}</div>
      </div>
      <div class="signal-draft-wrap">
        <div class="signal-angle-label" style="margin-bottom:6px">Draft opening</div>
        <div class="signal-draft">${s.draft_paragraph || ''}</div>
      </div>
      <div class="signal-actions">
        <button class="btn btn-green btn-sm" onclick="pushToCalendar('${s.id}', \`${(r.headline||'').replace(/`/g,"'")}\`, \`${(s.suggested_angle||'').replace(/`/g,"'")}\`, '${r.topic_cluster||''}')">
          <i class="ti ti-calendar-plus"></i> Push to calendar
        </button>
        <button class="btn btn-danger btn-sm" onclick="dismissSignal('${s.id}')">
          <i class="ti ti-x"></i> Dismiss
        </button>
        ${r.url ? `<a href="${r.url}" target="_blank" class="btn btn-ghost btn-sm"><i class="ti ti-external-link"></i> Source</a>` : ''}
        <span class="signal-source">${r.topic_cluster ? (CLUSTER_LABELS[r.topic_cluster] || r.topic_cluster) : ''}</span>
      </div>
    </div>`;
  }).join('');
}

async function pushToCalendar(id, headline, angle, cluster) {
  const btn = event.target.closest('button');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Pushing...';

  // Map cluster to project tag
  const projectMap = {
    fifa_2034_saudi: 'FIFA 2034',
    mega_event_governance: 'FIFA 2034',
    gcc_regional: 'Saudi Arabia',
    deal_origination: 'Investor Outreach',
    programme_delivery: 'Business Development',
    operator_business: 'Business Development',
    ai_applied: 'Business Development'
  };

  const { error } = await db.from('posts').insert({
    title: headline,
    notes: `Signal angle: ${angle}`,
    status: 'idea',
    post_type: 'post',
    tags: [cluster, 'signal-monitor'],
  });

  if (error) { toast('Failed to push to calendar', 'err'); btn.disabled = false; btn.innerHTML = '<i class="ti ti-calendar-plus"></i> Push to calendar'; return; }

  // Mark signal as actioned
  await db.from('processed_signals').update({ status: 'actioned' }).eq('id', id);
  document.getElementById(`sig-${id}`).style.opacity = '0.4';
  document.getElementById(`sig-${id}`).style.pointerEvents = 'none';

  toast('Added to content calendar', 'ok');
}

async function dismissSignal(id) {
  await db.from('processed_signals').update({ status: 'dismissed' }).eq('id', id);
  document.getElementById(`sig-${id}`)?.remove();
  await loadStats();
  toast('Dismissed');
}

async function runIngest() {
  const btn = document.getElementById('btn-ingest');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Ingesting...';
  toast('Running ingest...', 'info');

  try {
    const res = await fetch(`${FUNC}/ingest-rss-signals`, { method: 'POST', headers: HEADS });
    const data = await res.json();
    toast(`Ingest complete — ${data.inserted ?? 0} new signals`, 'ok');
    await loadStats();
  } catch (e) {
    toast('Ingest failed', 'err');
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-refresh"></i> Ingest';
}

async function runProcess() {
  const btn = document.getElementById('btn-process');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Processing...';
  toast('Analysing signal queue with AI...', 'info');

  try {
    const res = await fetch(`${FUNC}/process-signal-queue`, { method: 'POST', headers: HEADS });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    if (data.processed === 0) {
      toast('Queue empty — nothing to process', 'info');
    } else {
      toast(`Processed ${data.processed} signals (${data.errors || 0} errors)`, 'ok');
      await Promise.all([loadSignals(), loadStats()]);
    }
  } catch (e) {
    toast(`Failed: ${e.message}`, 'err');
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-cpu"></i> Process Queue';
}

async function init() {
  document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
  await Promise.all([loadStats(), loadManualChecks(), loadSignals()]);
}

init();
